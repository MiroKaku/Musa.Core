# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the main branch
on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
    # The branches below must be a subset of the branches above
    branches:
      - main

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: windows-2025

    # Any commit that contains [build] will now trigger these jobs, everything else will be skipped.
    # if: "contains(github.event.head_commit.message, '[build]')"

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $BuildVersion = "${{ github.ref_name }}".Substring(1);
          echo "BuildVersion=$BuildVersion" >> $env:GITHUB_ENV
          echo $BuildVersion

      - name: Setup Windows Driver Kit
        shell: pwsh
        run: |
          # --- Diagnose current WDK state ---
          Write-Host "=== WDK Diagnostic ===" -ForegroundColor Cyan

          $KitsRoot = $null
          try {
            $KitsRoot = (Get-ItemProperty "HKLM:\SOFTWARE\Microsoft\Windows Kits\Installed Roots" -ErrorAction Stop).KitsRoot10
          } catch {}
          Write-Host "KitsRoot10: $KitsRoot"

          # Detect installed SDK version from Include directory
          $SdkVersions = @()
          $IncludeDir = "C:\Program Files (x86)\Windows Kits\10\Include"
          if (Test-Path $IncludeDir) {
            $SdkVersions = Get-ChildItem $IncludeDir -Directory |
              Where-Object { $_.Name -match '^\d+\.\d+\.\d+\.\d+$' } |
              Sort-Object { [Version]$_.Name } -Descending |
              Select-Object -ExpandProperty Name
          }
          Write-Host "Installed SDK versions: $($SdkVersions -join ', ')"

          if ($SdkVersions.Count -eq 0) {
            Write-Error "No Windows SDK found under $IncludeDir"
            exit 1
          }

          $SdkVersion = $SdkVersions[0]
          $BuildNum = ([Version]$SdkVersion).Build
          Write-Host "Selected SDK version: $SdkVersion (build $BuildNum)"

          # Check if WDK km headers already exist
          $KmInclude = "C:\Program Files (x86)\Windows Kits\10\Include\$SdkVersion\km"
          $BuildProps = "C:\Program Files (x86)\Windows Kits\10\build\$SdkVersion\WindowsDriver.KernelMode.props"

          Write-Host "KM include path: $KmInclude (exists: $(Test-Path $KmInclude))"
          Write-Host "KernelMode props: $BuildProps (exists: $(Test-Path $BuildProps))"

          if ((Test-Path $KmInclude) -and (Test-Path $BuildProps)) {
            Write-Host "WDK already installed, skipping installation." -ForegroundColor Green
            exit 0
          }

          # --- Install WDK matching the detected SDK build ---
          $WdkPackageId = "Microsoft.WindowsWDK.10.0.$BuildNum"
          Write-Host "Installing $WdkPackageId ..." -ForegroundColor Yellow

          $logFile = "$env:RUNNER_TEMP\wdk-install.log"
          & winget install --source winget --exact --id $WdkPackageId --accept-source-agreements --accept-package-agreements --silent --log $logFile

          if ($LASTEXITCODE -ne 0) {
            Write-Host "WDK installation failed (exit code $LASTEXITCODE), log:" -ForegroundColor Red
            if (Test-Path $logFile) { Get-Content $logFile }
            exit 1
          }

          # --- Post-install verification ---
          Write-Host "=== Post-install Verification ===" -ForegroundColor Cyan
          $verified = $true

          if (-not (Test-Path $KmInclude)) {
            Write-Warning "KM include path still missing: $KmInclude"
            $verified = $false
          }
          if (-not (Test-Path $BuildProps)) {
            Write-Warning "KernelMode props still missing: $BuildProps"
            $verified = $false
          }

          if ($verified) {
            Write-Host "WDK installation verified successfully." -ForegroundColor Green
          } else {
            Write-Error "WDK installation incomplete - critical files missing."
            exit 1
          }

      - name: Build
        shell: cmd
        run: |
          .\BuildAllTargets.cmd

      - name: Build NuGet
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          # github的内置版本有Bug，此行必须添加，否则无法获得内容
          git fetch --depth=1 origin +refs/tags/*:refs/tags/*

          $releaseNotes = & git tag -l --format='%(contents)' $env:GITHUB_REF.Remove(0, 10)
          $content = [System.IO.File]::ReadAllText("Musa.Core.NuGet\Musa.Core.nuspec")

          $releaseNotesToken = '$releaseNotes$'
          $releaseNotesIndex = $content.IndexOf($releaseNotesToken)

          if($releaseNotesIndex -ne -1)
          {
            echo $content.Substring(0, $releaseNotesIndex) | out-file "Musa.Core.NuGet\Musa.Core-New.nuspec" -NoNewline
            echo $releaseNotes | out-file "Musa.Core.NuGet\Musa.Core-New.nuspec" -Append
            echo $content.Remove(0, $releaseNotesIndex + $releaseNotesToken.Length) | out-file "Musa.Core.NuGet\Musa.Core-New.nuspec" -NoNewline -Append
          }

      - name: Package
        if: startsWith(github.ref, 'refs/tags/v')
        shell: cmd
        run: |
          if "${{ env.BuildVersion }}" NEQ "" (
              NuGet pack .\Musa.Core.NuGet\Musa.Core-New.nuspec -Properties version=${{env.BuildVersion}};commit=%GITHUB_SHA%
          )
          if %ERRORLEVEL% NEQ 0 exit /B %ERRORLEVEL%

      - name: Package a zip
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: ${{github.workspace}}
        shell: cmd
        run: 7z a -tzip Musa.Core.zip Publish\

      - name: Publish NuGet
        if: startsWith(github.ref, 'refs/tags/v')
        shell: cmd
        run: |
          NuGet push Musa.Core.${{env.BuildVersion}}.nupkg -ApiKey ${{ secrets.NUGET_TOKEN }} -Source https://api.nuget.org/v3/index.json
          if %ERRORLEVEL% NEQ 0 exit /B %ERRORLEVEL%

      - name: Publish
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            Musa.Core.zip
            *.nupkg